<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-hover: #f8f9fa;
      --border: #e1e4e8;
      --text: #1a1a2e;
      --text-secondary: #586069;
      --accent: #4a56e2;
      --accent-light: #eef0ff;
      --input-bg: #f6f8fa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0;
      margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    header .channel-icon { width: 20px; height: 20px; color: var(--text-secondary); }
    header h1 { font-size: 15px; font-weight: 700; }
    header .member-count { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

    #join-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--accent-light);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #join-bar label { font-size: 13px; font-weight: 600; color: var(--text); }

    #join-bar input {
      flex: 1; max-width: 200px; padding: 6px 10px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--bg);
    }

    #join-bar button {
      padding: 6px 14px; background: var(--accent); color: white;
      border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    #join-bar button:hover { opacity: 0.9; }

    #messages { flex: 1; overflow-y: auto; padding: 8px 0; }

    .msg-group { padding: 6px 16px; }
    .msg-group:hover { background: var(--bg-hover); }

    .msg-group-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
      flex-shrink: 0;
    }

    .msg-author { font-weight: 700; font-size: 14px; }
    .msg-time { font-size: 11px; color: var(--text-secondary); }

    .msg-text {
      font-size: 14px; line-height: 1.5; margin-left: 44px;
      word-wrap: break-word; overflow-wrap: break-word;
    }

    .msg-reply-indicator {
      font-size: 12px; color: var(--accent); margin-left: 44px;
      margin-bottom: 2px; cursor: pointer;
    }

    .msg-actions { display: none; margin-left: 44px; margin-top: 4px; }
    .msg-group:hover .msg-actions { display: flex; gap: 6px; }

    .msg-actions button {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 8px; font-size: 11px; color: var(--text-secondary); cursor: pointer;
    }
    .msg-actions button:hover { background: var(--bg-hover); color: var(--text); }

    .day-divider { display: flex; align-items: center; padding: 16px 16px 8px; }
    .day-divider::before, .day-divider::after { content: ""; flex: 1; border-top: 1px solid var(--border); }
    .day-divider span { padding: 0 12px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }

    #reply-banner {
      display: none; align-items: center; gap: 8px; padding: 6px 16px;
      background: var(--accent-light); border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-secondary); flex-shrink: 0;
    }
    #reply-banner .cancel-reply {
      margin-left: auto; background: none; border: none; cursor: pointer;
      font-size: 16px; color: var(--text-secondary); line-height: 1;
    }

    #compose {
      display: none; padding: 8px 16px 12px;
      border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
    }

    #compose .input-row {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
    }

    #compose textarea {
      flex: 1; border: none; background: transparent; font-size: 14px;
      font-family: inherit; resize: none; min-height: 20px;
      max-height: 120px; line-height: 1.4;
    }
    #compose textarea:focus { outline: none; }

    #compose button[type="submit"] {
      width: 32px; height: 32px; background: var(--accent); color: white;
      border: none; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #compose button[type="submit"]:hover { opacity: 0.9; }
    #compose button[type="submit"]:disabled { opacity: 0.4; cursor: default; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--text-secondary);
      text-align: center; padding: 32px;
    }
    .empty-state p { margin-top: 8px; font-size: 14px; }

    @media (max-width: 480px) {
      .msg-avatar { width: 28px; height: 28px; font-size: 11px; }
      .msg-text, .msg-reply-indicator, .msg-actions { margin-left: 36px; }
    }
  </style>
</head>
<body>
  <header>
    <svg class="channel-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path d="M7.75 2.75a.75.75 0 00-1.5 0v3.5h-3.5a.75.75 0 000 1.5h3.5v4.5h-3.5a.75.75 0 000 1.5h3.5v3.5a.75.75 0 001.5 0v-3.5h4.5v3.5a.75.75 0 001.5 0v-3.5h3.5a.75.75 0 000-1.5h-3.5v-4.5h3.5a.75.75 0 000-1.5h-3.5v-3.5a.75.75 0 00-1.5 0v3.5h-4.5v-3.5zm4.5 5v4.5h-4.5v-4.5h4.5z"/>
    </svg>
    <h1>team-chat</h1>
    <span class="member-count" id="member-count" aria-live="polite"></span>
  </header>

  <div id="join-bar">
    <label for="username-input">Your name:</label>
    <input type="text" id="username-input" placeholder="e.g. Sarah" maxlength="30"
           aria-label="Enter your display name to join the chat">
    <button id="join-btn" type="button">Join</button>
  </div>

  <div id="messages" role="log" aria-label="Chat messages" aria-live="polite">
    <div class="empty-state" id="empty-state">
      <p>No messages yet. Start the conversation.</p>
    </div>
  </div>

  <div id="reply-banner" aria-live="polite">
    <span id="reply-text"></span>
    <button class="cancel-reply" id="cancel-reply" aria-label="Cancel reply">&times;</button>
  </div>

  <div id="compose">
    <form id="compose-form" class="input-row">
      <label for="msg-input" class="sr-only">Type a message</label>
      <textarea id="msg-input" rows="1" placeholder="Message #team-chat"
                aria-label="Type a message"></textarea>
      <button type="submit" aria-label="Send message" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M1.5 1.5l13 6.5-13 6.5v-5l8-1.5-8-1.5v-5z"/>
        </svg>
      </button>
    </form>
  </div>

  <script>
    const STORAGE_KEY = 'team-chat-messages';
    const USER_KEY = 'chat-username';
    let currentUser = null;
    let messages = [];
    let replyTo = null;

    const channel = typeof BroadcastChannel !== 'undefined'
      ? new BroadcastChannel('team-chat-sync')
      : null;

    const avatarColors = [
      '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
      '#9b59b6', '#1abc9c', '#e67e22', '#34495e',
    ];

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
    }

    function getAvatarColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return avatarColors[Math.abs(hash) % avatarColors.length];
    }

    function getInitials(name) {
      return name.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const today = new Date();
      if (d.toDateString() === today.toDateString()) return 'Today';
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function loadMessages() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        messages = raw ? JSON.parse(raw) : [];
      } catch {
        messages = [];
      }
    }

    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      const emptyState = document.getElementById('empty-state');

      if (messages.length === 0) {
        emptyState.style.display = 'flex';
        container.innerHTML = '';
        container.appendChild(emptyState);
        updateMemberCount();
        return;
      }

      emptyState.style.display = 'none';
      let html = '';
      let lastDate = '';
      let lastAuthor = '';
      let lastGroupTime = 0;

      for (const msg of messages) {
        const msgDate = formatDate(msg.timestamp);
        if (msgDate !== lastDate) {
          lastDate = msgDate;
          lastAuthor = '';
          html += '<div class="day-divider" role="separator"><span>' + escapeHtml(msgDate) + '</span></div>';
        }

        const sameGroup = msg.author === lastAuthor && (msg.timestamp - lastGroupTime) < 300000 && !msg.replyTo;
        const color = getAvatarColor(msg.author);

        if (!sameGroup) {
          html += '<div class="msg-group" data-id="' + msg.id + '">';
          html += '<div style="display:flex;gap:8px;">';
          html += '<div class="msg-avatar" style="background:' + color + '" aria-hidden="true">' + getInitials(msg.author) + '</div>';
          html += '<div style="flex:1;min-width:0;">';
          html += '<div class="msg-group-header">';
          html += '<span class="msg-author">' + escapeHtml(msg.author) + '</span>';
          html += '<time class="msg-time" datetime="' + new Date(msg.timestamp).toISOString() + '">' + formatTime(msg.timestamp) + '</time>';
          html += '</div>';
        } else {
          html += '<div class="msg-group" data-id="' + msg.id + '" style="padding-top:1px;padding-bottom:1px;">';
          html += '<div style="display:flex;gap:8px;">';
          html += '<div style="width:36px;flex-shrink:0;" aria-hidden="true"></div>';
          html += '<div style="flex:1;min-width:0;">';
        }

        if (msg.replyTo) {
          const parent = messages.find(function(m) { return m.id === msg.replyTo; });
          if (parent) {
            const preview = parent.text.length > 60 ? parent.text.slice(0, 60) + '...' : parent.text;
            html += '<div class="msg-reply-indicator" role="button" tabindex="0" data-scroll-to="' + parent.id + '">';
            html += 'Replying to ' + escapeHtml(parent.author) + ': ' + escapeHtml(preview);
            html += '</div>';
          }
        }

        html += '<div class="msg-text">' + escapeHtml(msg.text) + '</div>';
        html += '<div class="msg-actions">';
        html += '<button data-reply="' + msg.id + '" aria-label="Reply to this message">Reply</button>';
        html += '</div>';
        html += '</div></div></div>';

        lastAuthor = msg.author;
        lastGroupTime = msg.timestamp;
      }

      const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
      container.innerHTML = html;
      if (wasAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
      updateMemberCount();
    }

    document.getElementById('messages').addEventListener('click', function(e) {
      var replyBtn = e.target.closest('[data-reply]');
      if (replyBtn) {
        startReply(replyBtn.getAttribute('data-reply'));
        return;
      }
      var scrollBtn = e.target.closest('[data-scroll-to]');
      if (scrollBtn) {
        scrollToMsg(scrollBtn.getAttribute('data-scroll-to'));
      }
    });

    document.getElementById('messages').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var scrollBtn = e.target.closest('[data-scroll-to]');
        if (scrollBtn) scrollToMsg(scrollBtn.getAttribute('data-scroll-to'));
      }
    });

    function scrollToMsg(id) {
      var el = document.querySelector('[data-id="' + id + '"]');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.background = '#fff8dc';
        setTimeout(function() { el.style.background = ''; }, 1500);
      }
    }

    function startReply(id) {
      var msg = messages.find(function(m) { return m.id === id; });
      if (!msg) return;
      replyTo = id;
      var preview = msg.text.length > 50 ? msg.text.slice(0, 50) + '...' : msg.text;
      document.getElementById('reply-text').textContent = 'Replying to ' + msg.author + ': ' + preview;
      document.getElementById('reply-banner').style.display = 'flex';
      document.getElementById('msg-input').focus();
    }

    document.getElementById('cancel-reply').addEventListener('click', function() {
      replyTo = null;
      document.getElementById('reply-banner').style.display = 'none';
    });

    function updateMemberCount() {
      var authors = new Set(messages.map(function(m) { return m.author; }));
      var el = document.getElementById('member-count');
      var count = authors.size;
      el.textContent = count === 0 ? '' : count === 1 ? '1 participant' : count + ' participants';
    }

    function addMessage(text) {
      var msg = {
        id: generateId(),
        author: currentUser,
        text: text.trim(),
        timestamp: Date.now(),
        replyTo: replyTo || null,
      };
      messages.push(msg);
      saveMessages();
      replyTo = null;
      document.getElementById('reply-banner').style.display = 'none';
      renderMessages();
      var container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;

      if (channel) channel.postMessage({ type: 'new-message' });
    }

    // Sync across tabs in the same browser
    if (channel) {
      channel.addEventListener('message', function() {
        loadMessages();
        renderMessages();
      });
    }

    // Also listen for storage events (cross-tab fallback)
    window.addEventListener('storage', function(e) {
      if (e.key === STORAGE_KEY) {
        loadMessages();
        renderMessages();
      }
    });

    // Join flow
    var savedUser = localStorage.getItem(USER_KEY);
    if (savedUser) {
      joinAs(savedUser);
    }

    document.getElementById('join-btn').addEventListener('click', function() {
      var name = document.getElementById('username-input').value.trim();
      if (name) joinAs(name);
    });

    document.getElementById('username-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('join-btn').click();
      }
    });

    function joinAs(name) {
      currentUser = name;
      localStorage.setItem(USER_KEY, name);
      document.getElementById('join-bar').style.display = 'none';
      document.getElementById('compose').style.display = 'block';
      document.getElementById('username-input').value = name;
      loadMessages();
      renderMessages();
      document.getElementById('msg-input').focus();
      var container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    }

    // Compose
    var msgInput = document.getElementById('msg-input');
    var sendBtn = document.getElementById('send-btn');

    msgInput.addEventListener('input', function() {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
      sendBtn.disabled = !msgInput.value.trim();
    });

    msgInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (msgInput.value.trim()) {
          document.getElementById('compose-form').requestSubmit();
        }
      }
    });

    document.getElementById('compose-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = '';
      msgInput.style.height = 'auto';
      sendBtn.disabled = true;
      addMessage(text);
    });
  </script>
</body>
</html>
